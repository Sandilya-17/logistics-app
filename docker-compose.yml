version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: logistics-mongodb
    restart: unless-stopped
    volumes:
      - logistics-data:/data/db
    networks:
      - logistics-net

  backend:
    build: ./backend
    container_name: logistics-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/logistics_enterprise_db
    depends_on:
      - mongodb
    networks:
      - logistics-net

  frontend:
    build: ./frontend
    container_name: logistics-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - logistics-net

volumes:
  logistics-data:

networks:
  logistics-net:
