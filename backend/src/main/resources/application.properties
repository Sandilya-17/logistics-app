# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/logistics_enterprise_db

# Server Port — listen on all interfaces so other office computers can connect
server.port=8080
server.address=0.0.0.0

# JWT Secret (change this in production to a 256-bit random secret)
app.jwt.secret=enterprise-logistics-secret-key-change-in-production-2024
app.jwt.expiration=86400000

# App name
spring.application.name=logistics-enterprise-management

# CORS
spring.mvc.cors.allowed-origins=http://localhost:3000
