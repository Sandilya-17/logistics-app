# MongoDB (Railway friendly)
spring.data.mongodb.uri=${MONGO_URL}

# Server Port (Railway dynamic port)
server.port=${PORT:8080}
server.address=0.0.0.0

# JWT Secret
app.jwt.secret=enterprise-logistics-secret-key-change-in-production-2024
app.jwt.expiration=86400000

# App Name
spring.application.name=logistics-enterprise-management

# CORS (Allow deployed frontend + local)
spring.mvc.cors.allowed-origins=http://localhost:3000,https://logistics-app-gray.vercel.app

# Allow all methods
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Allow headers
spring.mvc.cors.allowed-headers=*
